apiVersion: apps/v1
kind: Deployment
metadata:
  name: textile-app
  labels:
    app: textile-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: textile-app
  template:
    metadata:
      labels:
        app: textile-app
    spec:
      containers:
      - name: textile-app
        image: nivethav006/textile-website:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
